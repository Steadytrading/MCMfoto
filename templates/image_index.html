
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Daily Image Generator</title>
<style>
body{font-family:Arial;background:#0b1320;color:white;text-align:center;padding:40px}
input{padding:12px;font-size:20px;border-radius:8px;border:none;width:200px}
button{padding:12px 20px;font-size:18px;border:none;border-radius:8px;background:#f5c84c;cursor:pointer;margin-left:10px}
</style>
</head>
<body>

<h1>Daily Trading Result Image</h1>

<form method="post" action="/generate-image">
<input name="profit" placeholder="4.12 or -1.2">
<button type="submit">Generate</button>
</form>

{% if error %}
<p style="color:red">{{error}}</p>
{% endif %}

</body>
</html>
